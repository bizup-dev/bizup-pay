openapi: 3.1.0
info:
  title: iCount API
  description: Unified iCount accounting and business management API. All endpoints use POST method and require authentication
    via session ID (sid) or user/pass/cid credentials.
  version: '3.0'
  contact:
    name: iCount
    url: https://www.icount.co.il
servers:
- url: https://api.icount.co.il/api/v3.php
  description: iCount API v3
tags:
- name: Accounting settings
- name: Authentication
- name: Autoinvoices for receipts
- name: Banks list
  description: '#### 🏦 Get to Know Your Banks with iCount API! 🏦

    Hey financial wizards! 🧙‍♂️✨ Whether you''re balancing the books or just need a quick peek at your banking options, our
    iCount API is here to turn that pile of bank statements into a neatly organized digital fiesta.'
