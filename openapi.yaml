      responses:
        '201':
          description: Response 201
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                  fields:
                    type: object
                    properties:
                      x-amz-meta-account-id:
                        type: string
                      x-amz-meta-user-id:
                        type: string
                      x-amz-meta-business-id:
                        type: string
                      x-amz-meta-file-context:
                        type: string
                      x-amz-meta-file-data:
                        type: string
                      bucket:
                        type: string
                      X-Amz-Algorithm:
                        type: string
                      X-Amz-Credential:
                        type: string
                      X-Amz-Date:
                        type: string
                      X-Amz-Security-Token:
                        type: string
                      key:
                        type: string
                      Policy:
                        type: string
                      X-Amz-Signature:
                        type: string
