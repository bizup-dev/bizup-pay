  /expenses/file:
    get:
      summary: 'Step 1: Get File Upload URL'
      description: '<p><a name="get-file-upload-url"> </a></p>

        <h4>Request Full Endpoints:</h4>

        <ul>

        <li>

        <p>For the <strong>PRODUCTION</strong> environment: <code>https://apigw.greeninvoice.co.il/file-upload/v1/url</code></p>

