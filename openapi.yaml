          content:
            application/json:
              schema:
                type: array
                items:
                  type:
                  - type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      children:
                        type:
                        - type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
              example:
              - id: 22
                updatedAt: 1718054936930
                name: אבטחה וחקירות
