                url: https://s3.eu-west-1.amazonaws.com/file-upload-service-uploaded
                fields:
                  x-amz-meta-account-id: 7bb70788-a5a2-44ba-8148-128e6ad94e07
                  x-amz-meta-user-id: 7bb70788-a5a2-44ba-8148-128e6ad94e07
                  x-amz-meta-business-id: 5fa6ae35-3d1a-4700-ab1d-689a921f27ed
                  x-amz-meta-file-context: expense
                  x-amz-meta-file-data: '{"source": 5}'
                  bucket: file-upload-service-uploaded
                  X-Amz-Algorithm: AWS4-HMAC-SHA256
                  X-Amz-Credential: ASIARYNZJIDOWGUCFND2/20240531/eu-west-1/s3/aws4_request
                  X-Amz-Date: 20240531T155356Z
                  X-Amz-Security-Token: 
