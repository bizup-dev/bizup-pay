    </tr>\n<tr>\n<td>3319</td>\n<td>מספר חדרים לא תקין.</td>\n</tr>\n<tr>\n<td>3320</td>\n<td>מספר רכב לא תקין.</td>\n</tr>\n\
    <tr>\n<td>3400</td>\n<td>נא למלא כותרת לחשבון.</td>\n</tr>\n<tr>\n<td>3401</td>\n<td>שיעור הוצאה מוכרת לא תקין.</td>\n\
    </tr>\n<tr>\n<td>3402</td>\n<td>שיעור מע״מ מוכר לא תקין.</td>\n</tr>\n<tr>\n<td>3403</td>\n<td>סוג ההוצאה לא תקין.</td>\n\
    </tr>\n<tr>\n<td>3404</td>\n<td>קוד 6111 לא תקין.</td>\n</tr>\n<tr>\n<td>3405</td>\n<td>לא ניתן למחוק סוג הוצאה ששויכו\
    \ אליו הוצאות.</td>\n</tr>\n</tbody>\n</table>\n<h3>Notes</h3>\n<blockquote>\n<p>The API is <strong>case sensitive</strong>\
    \ - make sure to validate that the parameters you send are in their correct form.</p>\n</blockquote>\n<h2>Getting Started</h2>\n\
    <h3>API Key</h3>\n<p>A user must acquire an API key (which is done within the morning by Green Invoice website and is\
    \ explained in <a href=\"https://support.greeninvoice.co.il/kb/he/article/%D7%90%D7%99%D7%9A-%D7%9C%D7%99%D7%A6%D7%95%D7%A8-%D7%9E%D7%A4%D7%AA%D7%97%D7%95%D7%AA-api\"\
    >here</a>) in-order to start using the API.</p>\n<p>Once a key is acquired the user can then start using the API key.</p>\n\
    <h3>Subscription</h3>\n<p>API access is available exclusively for users on the <strong><code>Best</code></strong> subscription\
    \ plan or higher.</p>\n<p>More info on the available subscription plans can be found in the <a href=\"https://www.greeninvoice.co.il/pricing\"\
    >paying section</a>.</p>\n<h3>API Limitations</h3>\n<p>The average rate limit of the API is approximately <code>3 requests\
    \ per second</code>.\nToo many requests will result in status code <code>429</code> (Too Many Requests) given by the server.\n\
    CORS is not supported - you should not use this API from a browser.</p>\n<h2>Support</h2>\n<p>The tech support email is\
    \ solely for support in matters of the API documentation.</p>\n<p>If you have any general question or proposal that requires\
    \ support please contact the support team instead in <a href=\"https://www.greeninvoice.co.il/contact\">here</a>.</p>\n\
    <p>Before contacting the tech support please read the API documentation very carefully.</p>\n<p>If you still haven’t found\
    \ an answer to your question or if you think there is a lack in documentation in one of the sections, please contact us\
    \ at <a href=\"mailto:support@morning.co\">support@morning.co</a>.</p>\n<p>Once submitting a question, please make sure\
    \ to submit all the details for your question, so that we can provide the best answer possible.</p>\n<p>If the question\
    \ you are submitting is related to a specific API endpoint, please make sure to also provide us with the data you sent\
    \ such as - request endpoint, request type used, headers, request parameters, as well as response status and the response\
    \ itself that was given by the server.</p>\n<h2>Webhooks (Callback URLs)</h2>\n<p>Some parameters in our API send webhooks\
    \ (also called Callback URLs, Notification URL) to a defined URL.</p>\n<p>Webhooks is a way for third party systems to\
    \ get notified regarding an event that occurred in our system.</p>\n<p>Once you as a third party system have subscribed\
    \ to listen to a specific event (e.g.: a document has finished processing), and that event occurred - your subscribed\
    \ callback URL will be notified with information regarding the event.</p>\n<blockquote>\n<p><strong>NOTE:</strong>\n<br>\n\
    Due to our system state-less characteristics we do not have a static IP that you can whitelist.</p>\n</blockquote>\n<h3>Inspecting\
    \ Webhooks for Local Development</h3>\n<p>You might have noticed that receiving these webhooks to a local development\
    \ machine is impossible due to your local development machine not being visible in the public net.</p>\n<p>There is an\
    \ easy fix for that - using interceptor websites.</p>\n<p>Websites such as <a href=\"https://webhook.site\">https://webhook.site</a>\
    \ can intercept a webhook from our servers and let you inspect the received information.</p>\n<p>To use them - just create\
    \ a URL and assign the callback parameter with the given URL. Once our servers have finished processing your request,\
    \ they will send a webhook notification to that interceptor callback URL, and you - will be able to inspect the data,\
    \ just as shown in the image below:</p>\n<p><img src=\"https://cdn.greeninvoice.co.il/files/ugc/0/b/8/0b80da6e300f45078fdc06e5682caf9b.png\"\
    \ alt=\"Inspecting Webhooks\"></p>\n<p>An alternative, better solution is to use <a href=\"https://ngrok.com/\">ngrok</a>,\
    \ which is a bit more advanced so we will not cover it on this guide.</p>"
  version: 1.0.0
servers:
- url: https://api.greeninvoice.co.il/api/v1
tags:
- name: Authentication
  description: '<h2>Obtain Access Token</h2>

    <blockquote>

    <p><strong>Note:</strong> The instructions for obtaining an Access Token have been moved to a separate guide.</p>

    </blockquote>

    <p>To obtain an <code>Access Token</code>, follow the documentation here:</p>

    <p><strong><a href="https://developers.morning.co">Obtaining An Access Token Guide</a></strong></p>

    <p>This guide contains the complete and up-to-date instructions for creating and managing Access Tokens.</p>'
- name: Businesses
  description: '<p>Businesses are a main component of Green Invoice system.</p>

    <p>Each business contains it''s own documents, clients, items &amp; settings.</p>'
- name: Clients
  description: '<p>You may add re-curring clients to your Green Invoice business user. This will allow you to add more information
    on the clients.</p>

    <p>The information can later be used to help you stay in touch with the clients and follow documents generated regarding
    their activities, as well as contact person, bank account and other information.</p>'
- name: Suppliers
  description: <p>To ease the process of entering the same supplier on multiple expenses you are able to create a supplier
    once and use it various times later while creating expenses.</p>
- name: Items
  description: '<p>While generating documents you are usually requested to add items.</p>

    <p>Items are products that are bought from you, it can be either a real product (such as electronic device, restaurant
    dish) or a virtual service (such as a programmer hour)..</p>

    <p>To ease the process of entering the same item on multiple documents you are able to create an item once and use it
    various times later while creating a document.</p>'
- name: Documents
  description: '<p>The main component of the Green Invoice system is the documents, these documents can be of different types,
    such as but not only - order, invoice, receipt.</p>

    <p>Documents are business specific, and only the documents of the current used business are visible to you.</p>'
- name: Expenses
  description: <p>Expenses allow you to track your records about outcome and to understand your cash flow better.</p>
- name: Payments
  description: <p>Provides interaction with our online invoice payments system.</p>
- name: Partners
  description: '<p><strong>NOTES:</strong></p>

    <blockquote>

    <ul>

    <li>

    <p>Preforming actions in user accounts are restricted only for <strong>existing users in ''morning'' with <code>Best</code>
    subscription plan or higher</strong>.</p>

    </li>

    <li>

    <p>Currently, partners are unable to create new user accounts.</p>

    </li>

    </ul>

    </blockquote>

    <p>To use the partners endpoints you have to be a Green Invoice partner.</p>

    <p>A morning by Green Invoice partner can connect third-party application to Green Invoice and control connected users
    through his application.</p>

    <p>Once you are a Green Invoice partner you''ll get an authorization code.</p>

    <p>As you can understand, in-order to work under a controlled user, there will be 3 steps:</p>

    <ul>

    <li>

    <p>Request authorization from an existing morning by Green Invoice user.

    Doing so - will return a key which you should store and protect it from unauthorized access, the key - includes the user
    API key ID and API secret.</p>

    </li>

    <li>

    <p>Using your partner <code>Authorization</code> code you should then request a JSON Web Token (JWT) for that user, using
    <a href="#account-token"><code>/account/token</code></a> endpoint.</p>

    </li>

    <li>

    <p>The last step is to use the user <code>Authorization</code> code that was received in the <a href="#account-token"><code>/account/token</code></a>
    endpoint under other endpoints and basically - control your user.</p>

    </li>

    </ul>

    <p><strong>NOTE:</strong> An inactive partner account will result in <code>403 (Forbidden)</code> status from the server.</p>'
- name: Tools
  description: '<p>Different tools and objects resources that can be of help to you.</p>

    <p>The tools does not require a JWT token and are accessible to everyone for use.</p>

    <p><strong>NOTE:</strong> The base URL is: <code>https://cache.greeninvoice.co.il</code></p>'
