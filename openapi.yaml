  /currency-exchange/v1/latest:
    get:
      summary: Get Supported Currencies
      description: '<p>Get the supported currencies.

        Retrieves the latest currency and the preivious day exchange rates by specified base currency.</p>

        <blockquote>

        <p><strong>NOTES:</strong></p>

        <ul>

        <li>The Endpoint URL is: <code>https://cache.greeninvoice.co.il/currency-exchange/v1/latest?base={base}</code></li>

        <li>The <code>base</code> parameter is required.</li>

        </ul>

        </blockquote>'
      tags:
      - Tools
      operationId: get_currency_exchange_v1_latest
      parameters:
      - name: base
        in: query
        required: true
        schema:
          type: string
        description: The 3-letter code for base currency
        example: ILS
      responses:
        '200':
          description: Response 200
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    base:
                      type: string
                    code:
                      type: string
                    symbol:
                      type: string
                    updatedAt:
                      type: number
                    rates:
                      type: object
                      properties:
                        spot:
                          type: object
                          properties:
                            current:
                              type: number
                            previous:
                              type: number
                            change:
                              type: number
                            changePercent:
                              type: number
                        closing:
                          type: object
                          properties:
                            current:
                              type: number
                            previous:
                              type: number
                            change:
                              type: number
                            changePercent:
                              type: number
              example:
              - base: ILS
                code: USD
                symbol: $
                updatedAt: 1720265835875
                rates:
                  spot:
                    current: 3.693908
                    previous: 3.679988
                    change: 0.01392
                    changePercent: 0.378262
                  closing:
                    current: 3.721
                    previous: 3.741
                    change: -0.02
                    changePercent: -0.534616
