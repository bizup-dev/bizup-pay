  /businesses/file:
    post:
      summary: Upload Business Related Files
      description: '<p>Upload business logo, signature, bookkeeping document, deduction document.</p>

        <blockquote>

        <p><strong>NOTE:</strong> The uploaded files need to be in Base64. The current allowed file types are: GIF, PNG, JPG,
        SVG, PDF.</p>

        </blockquote>'
      tags:
      - Businesses
      operationId: post_businesses_file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  anyOf:
                  - type: string
                  - type: string
                    enum:
                    - logo
                    - signature
                    - deduction
                    - bookkeeping
                file:
                  type: string
            example:
              type: logo
              file: data:image/png;base64,
      responses:
        '201':
          description: Response 201
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    anyOf:
                    - type: string
                    - type: string
                      enum:
                      - logo
                      - signature
                      - deduction
                      - bookkeeping
                  url:
                    type: string
              example:
                type: logo
                url: https://cdn.example.com/545e38b5bdf54364a53d9d3f01b7da70.png
    delete:
      summary: Delete Business Related Files
      tags:
      - Businesses
      operationId: delete_businesses_file
      responses:
        '200':
          description: Response 200
