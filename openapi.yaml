  /partners/users:
    get:
      summary: Get All Connected Users
      description: '<p>Gets all the connected and approved users.</p>

        <p>To get the user API keys related to your partner make a request using the user email with <a href="#get-connected-user"><code>Get
        Connected User</code></a> endpoint.</p>'
      tags:
      - Partners
      operationId: get_partners_users
      responses:
        '201':
          description: Response 201
          content:
            application/json:
              schema:
                type: array
              example:
              - email: example@email.com
                id: hRQAQfATT75fKQJkkJzbbC3l7Gq9oHLVxiHGdgp/uJsOwLX7
  /partners/users/connection:
    post:
      summary: Request User Approval
      description: '<p>Connect existing morning by Green Invoice user to partner.</p>

        <p>The user will then receive an email with request to approve the third-party connection.</p>

        <p>Once the user approves the request, you will get a JSON POST request notification to the callback url that you
        have specified in the <code>url</code> parameter you stated.</p>

        <p>This JSON POST notification will include the email that you requested to connect (so that you can identify to which
        user this key is relevant to).</p>

        <p><strong>NOTE:</strong> The connection approval email that the user receives expires within 3 days, once this connection
        request expires and wasn''t approved by the user - a new connection request must be initiated.</p>

        <p><strong>SECURITY NOTE</strong>: You will also get a special header <code>X-Data-Signature</code> with the signed
        <code>SHA256</code> value of the body using your partner auth token as the signature salt key, this can be used at
        your side to identify the credibility of the source once you receive the POST request notification. This validation
        is done by comparing the given <code>X-Data-Signature</code> data to the a self-encrypted JSON data (by applying the
        your partner <code>Authorization</code> code as salt using <code>SHA256</code> on the received JSON). This step is
        not a must but a security measure that can be taken by you to forbid request forgeries. Examples of creating base64
        hashes using HMAC SHA256 in different languages can be found <a href="https://www.jokecamp.com/blog/examples-of-creating-base64-hashes-using-hmac-sha256-in-different-languages">here</a></p>

        <p>To explain it even better, we made this flowchart:</p>

        <p><img src="https://cdn.greeninvoice.co.il/files/ugc/4/c/1/4c1131ed83cd40a9a174078429d4b2e7.png" alt="Request User
        Approval Flowchart"></p>'
      tags:
      - Partners
      operationId: post_partners_users_connection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                url:
                  type: string
              required:
              - email
              - url
            example:
              email: email@example.com
              url: https://example.com/callback
      responses:
        '200':
          description: Response 200
    delete:
      summary: Disconnect Partner User
      description: '<p>Removes a connected user from your partner.</p>

        <p>This will remove any partner related API keys from all the connected businesses of the user that was created and
        your will no longer be able to access it''s resources.</p>

        <p>In case you are billed on this user, you will no longer pay on any future documents.</p>

        <p>Once the user is removed, the user will get a notification email regarding the disconnection.</p>

        <p>A disconnected partner user can reconnect at any time.</p>

        <p><strong>NOTE:</strong> All of the businesses of the specified user that relates to your partner will be disconnected.</p>'
      tags:
      - Partners
      operationId: delete_partners_users_connection
      parameters:
      - name: email
        in: query
        required: true
        schema:
          type: string
        description: Account's email to disconnect.
        example: email@example.com
      responses:
        '200':
          description: Response 200
