openapi: 3.0.3
info:
  title: morning by Green Invoice API
  description: "<p><img src=\"https://cdn.greeninvoice.co.il/files/ugc/f/1/8/f185c651f3514ee8a53139257d3bfa19.png\" alt=\"\
    morning by Green Invoice Logo\"></p>\n<h2>Overview</h2>\n<h3>Endpoint URL</h3>\n<p>The Green Invoice system includes multiple\
    \ environments, each serving a different purpose.</p>\n<p>These environments use different databases and API keys, meaning\
    \ that data generated in one environment will not be available in another.</p>\n<h4>Sandbox</h4>\n<p>This environment\
    \ is used for testing, allowing you to experiment without affecting your production data. It includes the latest system\
    \ updates.</p>\n<ul>\n<li>\n<p><strong>Registration:</strong> To use this environment, you must create a new user at <a\
    \ href=\"https://lp.sandbox.d.greeninvoice.co.il/join\">lp.sandbox.d.greeninvoice.co.il/join</a>.</p>\n</li>\n<li>\n<p><strong>Base\
    \ URL:</strong> <code>https://sandbox.d.greeninvoice.co.il/api/v1/</code></p>\n</li>\n</ul>\n<blockquote>\n<p><strong>Note:</strong>\n\
    <br>\nThere is no need to enter credit card information when adding a subscription; a demo credit card is used automatically\
    \ for Sandbox subscriptions.</p>\n</blockquote>\n<br>\n<br>\n<p><strong>Payments Testing in Sandbox</strong></p>\n<p>When\
    \ testing the payments section, a preconfigured testing credit card is used.</p>\n<ul>\n<li>\n<p><strong>Allowed amount:</strong>\
    \ Up to (or equal to) <strong>5,000 ILS</strong>.</p>\n</li>\n<li>\n<p><strong>Failure simulation:</strong> Amounts exceeding\
    \ 5,000 ILS will result in a card issue to demonstrate a failing transaction.\n<br></p>\n</li>\n</ul>\n<h4>Production:</h4>\n\
    <p>This is the default, live environment.</p>\n<ul>\n<li><strong>Base URL:</strong> <code>https://api.greeninvoice.co.il/api/</code>.</li>\n\
    </ul>\n<h3>HTTP response codes</h3>\n<ul>\n<li>\n<p><strong>200 — Success</strong> Everything went smooth.</p>\n</li>\n\
    <li>\n<p><strong>400 — Bad Request</strong> There was a validation error with the input.</p>\n</li>\n<li>\n<p><strong>401\
    \ — Unauthorized</strong> Missing or incorrect JSON Web Token (JWT) in <code>Authorization</code> header.</p>\n</li>\n\
    <li>\n<p><strong>403 — Forbidden</strong> You are trying to request a resource you aren't allowed to.</p>\n</li>\n<li>\n\
    <p><strong>404 — Not Found</strong> One or more of the required resources was not found, or you do not own the resource.</p>\n\
    </li>\n<li>\n<p><strong>500 — Internal Server Error</strong> This is an issue with morning by Green Invoice’s servers\
    \ processing your request. In most cases we are notified so that we can investigate the issue.</p>\n</li>\n</ul>\n<h3>Error\
    \ Codes</h3>\n<p>When working with the morning by Green Invoice system you might have to tackle error codes that you will\
    \ receive as response.</p>\n<p>Whenever the morning by Green Invoice servers detect an error it will return a JSON object\
    \ containing error details:</p>\n<pre><code>{\n    &quot;errorCode&quot;: 2002,\n    &quot;errorMessage&quot;: &quot;מייל\
    \ או סיסמה לא נכונים.&quot;\n}\n</code></pre>\n<p>Green Invoice system is in Hebrew language and therefore the errors\
    \ you will receive are in Hebrew.</p>\n<p>We have added a list for you to view of the error code numbers and their descriptions\
    \ (the descriptions are in Hebrew).</p>\n<table>\n<thead>\n<tr>\n<th>Error Code</th>\n<th>Description</th>\n</tr>\n</thead>\n\
    <tbody>\n<tr>\n<td>401</td>\n<td>גישה נדחתה, נא להתחבר מחדש.</td>\n</tr>\n<tr>\n<td>1002</td>\n<td>שדה שם ריק.</td>\n\
    </tr>\n<tr>\n<td>1003</td>\n<td>לא נמצא עסק פעיל בחשבון.</td>\n</tr>\n<tr>\n<td>1004</td>\n<td>Empty request body or invalid\
    \ JSON.</td>\n</tr>\n<tr>\n<td>1005</td>\n<td>שגיאה במהלך שמירה.</td>\n</tr>\n<tr>\n<td>1006</td>\n<td>נא לחדש את המינוי.</td>\n\
    </tr>\n<tr>\n<td>1007</td>\n<td>חסרה הרשאה מתאימה.</td>\n</tr>\n<tr>\n<td>403</td>\n<td>גישה אסורה.</td>\n</tr>\n<tr>\n\
    <td>404</td>\n<td>פריט לא נמצא.</td>\n</tr>\n<tr>\n<td>405</td>\n<td>Method Not Allowed.</td>\n</tr>\n<tr>\n<td>1008</td>\n\
    <td>פריט לא עודכן, כיוון שלא בוצעו שינויים.</td>\n</tr>\n<tr>\n<td>1009</td>\n<td>יש לבחור כתובות מייל.</td>\n</tr>\n\
    <tr>\n<td>1010</td>\n<td>קיימת כבר בקשה עם נתונים זהים.</td>\n</tr>\n<tr>\n<td>1011</td>\n<td>שפה לא נתמכת.</td>\n</tr>\n\
    <tr>\n<td>1012</td>\n<td>פעולה זו נתמכת במינוי גבוה יותר.</td>\n</tr>\n<tr>\n<td>1013</td>\n<td>קובץ ריק או לא תקין.</td>\n\
    </tr>\n<tr>\n<td>1014</td>\n<td>סוג קובץ לא נתמך.</td>\n</tr>\n<tr>\n<td>1015</td>\n<td>יש להסדיר את החוב בחשבון על מנת\
    \ לבצע את הפעולה.</td>\n</tr>\n<tr>\n<td>1016</td>\n<td>שגיאה בעדכון בסיס נתונים.</td>\n</tr>\n<tr>\n<td>1017</td>\n<td>שגיאה\
    \ כללית.</td>\n</tr>\n<tr>\n<td>1018</td>\n<td>שגיאה בשליחת מייל. יתכן וכתובת המייל חסומה או לא תקינה.</td>\n</tr>\n<tr>\n\
    <td>1019</td>\n<td>כתובת המייל של הנמען חסומה לשליחה.</td>\n</tr>\n<tr>\n<td>1020</td>\n<td>שגיאת הצפנה.</td>\n</tr>\n\
    <tr>\n<td>1100</td>\n<td>שדה {id} לא תקין</td>\n</tr>\n<tr>\n<td>1101</td>\n<td>לא נשלחו שדות לעדכון.</td>\n</tr>\n<tr>\n\
    <td>1102</td>\n<td>כתובת מייל לא תקינה.</td>\n</tr>\n<tr>\n<td>1103</td>\n<td>כתובת אתר לא תקינה.</td>\n</tr>\n<tr>\n\
    <td>1104</td>\n<td>קוד מדינה לא תקין.</td>\n</tr>\n<tr>\n<td>1105</td>\n<td>ערך תנאי תשלום לא תקין.</td>\n</tr>\n<tr>\n\
    <td>1106</td>\n<td>ערך קוד מטבע לא תקין.</td>\n</tr>\n<tr>\n<td>1107</td>\n<td>שער המרה לא תקין, ערך צריך להיות גדול מאפס.</td>\n\
    </tr>\n<tr>\n<td>1108</td>\n<td>שיעור מע&quot;מ לא תקין. צריך להיות בין 0-1.</td>\n</tr>\n<tr>\n<td>1109</td>\n<td>קיימת\
    \ שורה עם מע&quot;מ במסמך ללא מע&quot;מ.</td>\n</tr>\n<tr>\n<td>1110</td>\n<td>מחיר לא תקין.</td>\n</tr>\n<tr>\n<td>2000</td>\n\
    <td>החשבון עדיין לא פעיל.</td>\n</tr>\n<tr>\n<td>2001</td>\n<td>משתמש חסום.</td>\n</tr>\n<tr>\n<td>2002</td>\n<td>מייל\
    \ או סיסמה לא נכונים.</td>\n</tr>\n<tr>\n<td>2003</td>\n<td>משתמש לא קיים.</td>\n</tr>\n<tr>\n<td>2004</td>\n<td>נא למלא\
    \ שם פרטי.</td>\n</tr>\n<tr>\n<td>2005</td>\n<td>נא למלא שם משפחה.</td>\n</tr>\n<tr>\n<td>2006</td>\n<td>סיסמה לא תקינה.\
    \ צריכה להיות 8-16 ספרות או תווים.</td>\n</tr>\n<tr>\n<td>2007</td>\n<td>מייל תפוס.</td>\n</tr>\n<tr>\n<td>2008</td>\n\
    <td>סיסמה נוכחית לא נכונה.</td>\n</tr>\n<tr>\n<td>2009</td>\n<td>מספר ת.ז. לא תקין.</td>\n</tr>\n<tr>\n<td>2010</td>\n\
    <td>החשבון כבר הופעל.</td>\n</tr>\n<tr>\n<td>2012</td>\n<td>ערך id לא תקין.</td>\n</tr>\n<tr>\n<td>2013</td>\n<td>ערך\
    \ type לא תקין.</td>\n</tr>\n<tr>\n<td>2014</td>\n<td>נתוני מפתח לא נכונים.</td>\n</tr>\n<tr>\n<td>1111</td>\n<td>מספר\
    \ עוסק / ח.פ אינו תקין.</td>\n</tr>\n<tr>\n<td>1112</td>\n<td>לא ניתן להוסיף מסמכים. בחודש זה הופקה כמות המסמכים המירבית\
    \ לחשבון.</td>\n</tr>\n<tr>\n<td>1113</td>\n<td>שדה תקבול לא נשלח.</td>\n</tr>\n<tr>\n<td>1114</td>\n<td>תאריך התחלה לא\
    \ תקין.</td>\n</tr>\n<tr>\n<td>1115</td>\n<td>תאריך סיום לא תקין.</td>\n</tr>\n<tr>\n<td>1116</td>\n<td>סכום מע״מ לא תקין.</td>\n\
    </tr>\n<tr>\n<td>1117</td>\n<td>תאריך לא תקין.</td>\n</tr>\n<tr>\n<td>1118</td>\n<td>לא ניתן לרכוש שירותים נוספים ללא\
    \ מסלול פעיל בתשלום.</td>\n</tr>\n<tr>\n<td>1119</td>\n<td>גודל עמוד צריך להיות לכל היותר 100.</td>\n</tr>\n<tr>\n<td>1120</td>\n\
    <td>כתובת הדומיין של המייל לא תקינה.</td>\n</tr>\n<tr>\n<td>2100</td>\n<td>סוג עוסק לא תקין.</td>\n</tr>\n<tr>\n<td>2101</td>\n\
    <td>שם העסק לא יכול להיות ריק.</td>\n</tr>\n<tr>\n<td>2102</td>\n<td>לא ניתן להוסיף עוד עסקים במסגרת המינוי.</td>\n</tr>\n\
    <tr>\n<td>2103</td>\n<td>נא למלא כתובת עסק.</td>\n</tr>\n<tr>\n<td>2104</td>\n<td>נא למלא עיר.</td>\n</tr>\n<tr>\n<td>2105</td>\n\
    <td>קובץ לא תקין או גדול מ 5M.</td>\n</tr>\n<tr>\n<td>2106</td>\n<td>סוג קובץ לא נתמך.</td>\n</tr>\n<tr>\n<td>2107</td>\n\
    <td>מספר תבנית עיצוב לא תקין.</td>\n</tr>\n<tr>\n<td>2125</td>\n<td>מספר סקין בתבנית עיצוב לא תקין.</td>\n</tr>\n<tr>\n\
    <td>2126</td>\n<td>אחוז מקדמות אינו תקין. ערך תקין הוא מספר בין 0-35.</td>\n</tr>\n<tr>\n<td>2127</td>\n<td>ערך תחום עיסוק\
    \ לא תקין.</td>\n</tr>\n<tr>\n<td>2128</td>\n<td>ערך מקצוע לא תקין.</td>\n</tr>\n<tr>\n<td>2129</td>\n<td>ערך סדר עיצוב\
    \ שדות תקבולים במסמך לא תקין.</td>\n</tr>\n<tr>\n<td>2108</td>\n<td>לא נמצא עסק.</td>\n</tr>\n<tr>\n<td>2109</td>\n<td>מספר\
    \ סניף בנק יכול להכיל עד 5 תווים.</td>\n</tr>\n<tr>\n<td>2110</td>\n<td>עסק עם שם זהה כבר רשום בחשבון.</td>\n</tr>\n<tr>\n\
    <td>2111</td>\n<td>מספר עוסק / ח.פ כבר קיים בחשבון.</td>\n</tr>\n<tr>\n<td>2112</td>\n<td>מספר עוסק / ח.פ כבר קיים במערכת\
    \ תחת חשבון אחר.</td>\n</tr>\n<tr>\n<td>2113</td>\n<td>מספר עוסק / ח.פ כבר רשום בחשבון פעמיים. ניתן עד להקים עד 2 עסקים\
    \ עם אותו מספר עוסק.</td>\n</tr>\n<tr>\n<td>2114</td>\n<td>מספר תיק ניכויים אינו תקין.</td>\n</tr>\n<tr>\n<td>2115</td>\n\
    <td>אחוז ניכוי במקור אינו תקין. ערך תקין הוא מספר בין 0-35.</td>\n</tr>\n<tr>\n<td>2116</td>\n<td>ערך שיטת דיווח לא תקין.</td>\n\
    </tr>\n<tr>\n<td>2117</td>\n<td>ניתן להוסיף עד 3 כתובות מייל להנהלת חשבונות.</td>\n</tr>\n<tr>\n<td>2118</td>\n<td>חלק\
    \ מההשדות לא עודכנו. קיים עסק נוסף עם מספר עוסק זהה ולכן חייב להישמר ביניהם טווח הפרש של לפחות 8,000.</td>\n</tr>\n<tr>\n\
    <td>2119</td>\n<td>מספור מסמך לא תקין. ערכים תקינים בין 1-999999999.</td>\n</tr>\n<tr>\n<td>2120</td>\n<td>שדה {types}\
    \ לא נשלח.</td>\n</tr>\n<tr>\n<td>2121</td>\n<td>לא ניתן לעדכן מספור זה מאחר וכבר הופקו מסמכים בשנה זו.</td>\n</tr>\n\
    <tr>\n<td>2122</td>\n<td>לא ניתן לבצע פעולה זו בעסק מוקפא.</td>\n</tr>\n<tr>\n<td>2123</td>\n<td>ערך {id} לא תקין של העסק</td>\n\
    </tr>\n<tr>\n<td>2124</td>\n<td>תוכן בתחתית המסמך מוגבל ל-2000 תווים.</td>\n</tr>\n<tr>\n<td>2200</td>\n<td>ניתן להוסיף\
    \ עד 3 כתובות מייל ללקוח.</td>\n</tr>\n<tr>\n<td>2201</td>\n<td>נא למלא שם לקוח.</td>\n</tr>\n<tr>\n<td>2202</td>\n<td>לא\
    \ ניתן לאחד לקוח פעיל.</td>\n</tr>\n<tr>\n<td>2203</td>\n<td>לא ניתן למחוק לקוח שהופקו עבורו מסמכים.</td>\n</tr>\n<tr>\n\
    <td>2204</td>\n<td>שדה {id} של לקוח מטרה לא נשלח.</td>\n</tr>\n<tr>\n<td>2205</td>\n<td>לא נמצאו לקוחות חדשים או שהקובץ\
    \ המיובא אינו תקין.</td>\n</tr>\n<tr>\n<td>2206</td>\n<td>ניתן להוסיף עד 3 תגיות ללקוח.</td>\n</tr>\n<tr>\n<td>2207</td>\n\
    <td>קובץ לא תקין או גדול מ 5M.</td>\n</tr>\n<tr>\n<td>2208</td>\n<td>יתרה לא תקינה.</td>\n</tr>\n<tr>\n<td>2209</td>\n\
    <td>הכנסות לא תקינות.</td>\n</tr>\n<tr>\n<td>2210</td>\n<td>לא ניתן למחוק לקוח בעל כרטיסי אשראי שמורים.</td>\n</tr>\n\
    <tr>\n<td>2250</td>\n<td>ניתן להוסיף עד 3 כתובות מייל לספק.</td>\n</tr>\n<tr>\n<td>2251</td>\n<td>נא למלא שם ספק.</td>\n\
    </tr>\n<tr>\n<td>2252</td>\n<td>לא ניתן לאחד ספק פעיל.</td>\n</tr>\n<tr>\n<td>2253</td>\n<td>לא ניתן למחוק ספק ששויכו\
    \ אליו הוצאות.</td>\n</tr>\n<tr>\n<td>2254</td>\n<td>שדה {id} של ספק מטרה לא נשלח.</td>\n</tr>\n<tr>\n<td>2255</td>\n\
    <td>לא נמצאו ספקים חדשים ותקינים בקובץ היבוא.</td>\n</tr>\n<tr>\n<td>2256</td>\n<td>ניתן להוסיף עד 3 תגיות ללקוח.</td>\n\
    </tr>\n<tr>\n<td>2257</td>\n<td>קובץ לא תקין או גדול מ 5M.</td>\n</tr>\n<tr>\n<td>2258</td>\n<td>יתרה לא תקינה.</td>\n\
    </tr>\n<tr>\n<td>2259</td>\n<td>הכנסות לא תקינות.</td>\n</tr>\n<tr>\n<td>2300</td>\n<td>נא למלא שם פריט.</td>\n</tr>\n\
    <tr>\n<td>2301</td>\n<td>נא למלא תיאור פריט.</td>\n</tr>\n<tr>\n<td>2302</td>\n<td>לא נמצאו פריטים חדשים ותקינים בקובץ\
    \ היבוא.</td>\n</tr>\n<tr>\n<td>2305</td>\n<td>קובץ לא תקין או גדול מ 5M.</td>\n</tr>\n<tr>\n<td>2400</td>\n<td>לא ניתן\
    \ לסגור מסמך שאינו פתוח.</td>\n</tr>\n<tr>\n<td>2401</td>\n<td>לא ניתן לפתוח מסמך שאינו סגור ידנית.</td>\n</tr>\n<tr>\n\
    <td>2402</td>\n<td>שדה {ids} לא נשלח או לא תקין.</td>\n</tr>\n<tr>\n<td>2403</td>\n<td>סוג מסמך לא נשלח או אינו נתמך עבור\
    \ סוג עסק זה.</td>\n</tr>\n<tr>\n<td>2404</td>\n<td>Invalid or missing {linkType} field. Can be only (copy|cancel|link).</td>\n\
    </tr>\n<tr>\n<td>2405</td>\n<td>התאריך שנבחר עתידי או מוקדם מדי לסוג מסמך זה.</td>\n</tr>\n<tr>\n<td>2406</td>\n<td>ערך\
    \ שפה לא תקין.</td>\n</tr>\n<tr>\n<td>2407</td>\n<td>ערך קוד מטבע לא תקין.</td>\n</tr>\n<tr>\n<td>2408</td>\n<td>תאריך\
    \ לתשלום עד לא תקין.</td>\n</tr>\n<tr>\n<td>2409</td>\n<td>סוג מע&quot;מ לא תקין.</td>\n</tr>\n<tr>\n<td>2410</td>\n<td>שדה\
    \ לקוח {client} חסר.</td>\n</tr>\n<tr>\n<td>2411</td>\n<td>לקוח לא קיים.</td>\n</tr>\n<tr>\n<td>2412</td>\n<td>חשבונית\
    \ עצמית יכולה להיות מופקת רק עם סוג חשבונית מס.</td>\n</tr>\n<tr>\n<td>2413</td>\n<td>נא למלא לפחות שירות או פריט אחד.</td>\n\
    </tr>\n<tr>\n<td>2414</td>\n<td>סכום תשלום לא תקין. צריך להיות מספר עשרוני.</td>\n</tr>\n<tr>\n<td>2415</td>\n<td>תיאור\
    \ שורה לא יכול להיות ריק.</td>\n</tr>\n<tr>\n<td>2416</td>\n<td>סכום מסמך לא תקין. צריך להיות שונה מאפס.</td>\n</tr>\n\
    <tr>\n<td>2417</td>\n<td>סכום מסמך לא תקין. צריך להיות גדול מאפס.</td>\n</tr>\n<tr>\n<td>2418</td>\n<td>סכום מסמך לא תקין.\
    \ צריך להיות גדול או שווה לאפס.</td>\n</tr>\n<tr>\n<td>2419</td>\n<td>נא למלא לפחות שורת תקבולים אחת.</td>\n</tr>\n<tr>\n\
    <td>2420</td>\n<td>Invalid discount type. Can be 'sum' or 'percentage'.</td>\n</tr>\n<tr>\n<td>2421</td>\n<td>קוד סוג\
