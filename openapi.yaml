                  - type: number
                  - type: number
                    enum:
                    - 320
                    - 400
                    - 405
                    - 600
                lang:
                  anyOf:
                  - type: string
                  - type: string
                    enum:
                    - he
                    - en
                currency:
                  anyOf:
                  - type: string
                  - type: string
                    enum:
                    - ILS
                    - USD
                    - EUR
                    - GBP
                vatType:
                  anyOf:
                  - type: number
                  - type: number
                    enum:
                    - 0
                    - 1
                    - 2
