      description: '<blockquote>

        <p><strong>NOTE:</strong> In-order to merge clients, one of them must be inactive. Once merged - the inactive client
        will be deleted and all his documents will be added to the merged client.</p>

        </blockquote>'
      tags:
      - Clients
      operationId: post_clients_id_merge
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mergeId:
                  type: string
              required:
              - mergeId
            example:
              mergeId: 6f9g7a6d-095e-46d4-b2c6-331747508759
      responses:
        '200':
          description: Response 200
  /clients/{id}/balance:
    post:
      summary: Update Client Balance
      description: '<p>Update the balance of a client.</p>

        <p>This endpoint will recalculate the final payment amount of a client by the given requested balance.</p>

        <p>To reset a client''s balance - insert 0 as value.</p>'
      tags:
      - Clients
      operationId: post_clients_id_balance
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                balance:
                  type: number
              required:
              - balance
            example:
              balance: 4
      responses:
        '200':
          description: Response 200
