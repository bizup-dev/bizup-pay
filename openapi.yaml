      - Expenses
      operationId: get_expenses_file
      parameters:
      - name: context
        in: query
        required: true
        schema:
          type: string
          enum:
          - expense
      - name: data
        in: query
        required: true
        schema:
          type: string
        description: '''&quot;source&quot;: 5'' is mandatory. &quot;id&quot; &amp; &quot;state&quot; should only exist for
          updating an existing expense'
